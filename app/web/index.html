<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>AIRPOC · FAZE-1</title>
<link rel="stylesheet" href="/app.css">
</head>
<body class="night">
<div id="app">

  <header class="topbar">
    <h1>FAZE-1</h1>
    <div class="tabs" id="mode">
      <button data-mode="scan" class="active">SCAN</button>
      <button data-mode="track">TRACK</button>
    </div>
    <div class="pills">
      <span class="pill on" id="p-link"><span class="dot"></span><b id="v-link">—</b> Mb/s</span>
      <span class="pill">BATT <b id="v-batt">—</b></span>
      <span class="pill">ALT <b id="v-alt">—</b></span>
      <span class="pill"><b id="v-zulu">--:--</b> Z</span>
      <button class="icb" id="theme">NIGHT</button>
      <button class="icb" id="devbtn">DEV</button>
    </div>
  </header>

  <main id="stage">

    <section id="eo" class="hero">
      <img id="video" src="/stream" alt="EO">
      <canvas id="eo-ovl"></canvas>
      <div class="otl" id="eo-tl">EO</div>
      <div class="otr" id="eo-tr">BRG —  RNG —</div>
      <button class="exp" data-swap aria-label="swap radar and EO">
        <svg viewBox="0 0 24 24"><path d="M4 10V4h6M20 14v6h-6M4 4l7 7M20 20l-7-7"/></svg>
      </button>
    </section>

    <section id="radar" class="pip">
      <div class="panel-head"><span class="panel-title">RADAR</span><span class="hz" id="v-tracks">no data</span></div>
      <div class="rwrap">
        <canvas id="radar-cv"></canvas>
        <button class="exp" data-swap aria-label="swap radar and EO">
          <svg viewBox="0 0 24 24"><path d="M4 10V4h6M20 14v6h-6M4 4l7 7M20 20l-7-7"/></svg>
        </button>
      </div>
    </section>

    <nav id="cluster">
      <button class="big" id="light">LIGHT</button>
      <button class="big" id="autofov">AUTO<small>FOV</small></button>
      <button class="big" id="trackbtn">TRACK</button>
      <button class="big" id="rec">REC</button>
    </nav>

    <div id="zoombar">
      <button data-zoom="1">+</button>
      <div id="v-zval">1.0×</div>
      <button data-zoom="-1">−</button>
    </div>

    <aside id="dev">
      <div class="dev-head"><b>DEV</b><button id="devclose">✕</button></div>

      <div class="sec">STREAM</div>
      <div class="presets" id="presets">
        <button data-preset="LEAN">LEAN</button>
        <button data-preset="SMOOTH" class="active">SMOOTH</button>
        <button data-preset="BALANCED">BAL</button>
        <button data-preset="CLEAR">CLEAR</button>
      </div>
      <div class="srow"><label>FPS</label><input type="range" id="s-fps" min="1" max="60" step="1" value="60"><span class="val" id="o-fps">60</span></div>
      <div class="srow"><label>QUAL</label><input type="range" id="s-q" min="10" max="95" step="1" value="45"><span class="val" id="o-q">45</span></div>
      <div class="est" id="v-est">EST — Mb/s · — fps</div>

      <div class="sec">ILLUMINATOR</div>
      <div class="srow"><label>PWR</label><input type="range" id="s-pow" min="0" max="100" step="1" value="25"><span class="val" id="o-pow">25%</span></div>
      <div class="srow"><label>BEAM</label><input type="range" id="s-fov" min="2" max="70" step="1" value="70"><span class="val" id="o-fov">70°</span></div>
      <div class="kv">AE <span class="muted">reserved</span></div>

      <div class="sec">SYSTEM</div>
      <div class="kv">TEMP <b><span id="v-cpu">—</span>° CPU · <span id="v-cam">—</span>° CAM</b></div>
      <div class="kv">EO SOURCE <b><span id="v-srcfps">—</span> fps</b></div>
      <div class="sysbtns"><button id="restart">RESTART</button><button id="logs">LOGS</button></div>
    </aside>

  </main>
</div>
<script src="/app.js"></script>
</body>
</html>
