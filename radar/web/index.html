<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>AIRPOC Radar</title>
<style>
  html,body{margin:0;height:100%;background:#0a0e12;font-family:monospace;color:#cde}
  #hud{position:fixed;top:8px;left:10px;color:#6cf;font-size:13px;z-index:2;
       text-shadow:0 0 3px #000,0 0 3px #000}
  #legend{position:fixed;top:8px;right:10px;font-size:11px;color:#9ab;text-align:right;line-height:1.5}
  #legend b{font-weight:normal}
  .app{color:#ff5555}.rec{color:#50aaff}.stat{color:#00d4ff}
  #ppi{display:block;width:100vw;height:100vh}
  #ctl{position:fixed;top:34px;left:10px;z-index:3;background:rgba(10,14,18,.82);
       border:1px solid #1d2b34;border-radius:8px;padding:8px 10px;font-size:11px;color:#9ab;width:186px}
  #ctl h4{margin:0 0 6px;font-size:11px;color:#6cf;font-weight:normal;letter-spacing:.5px}
  #ctl .row{display:flex;align-items:center;gap:6px;margin:5px 0}
  #ctl label{flex:0 0 88px}
  #ctl input[type=range]{flex:1;min-width:0;accent-color:#00d4ff;height:14px}
  #ctl .val{flex:0 0 34px;text-align:right;color:#cde}
</style>
</head>
<body>
  <div id="hud">connecting…</div>
  <div id="legend">
    <b class="app">■ approaching</b><br>
    <b class="rec">■ receding</b><br>
    <b class="stat">■ static</b><br>
    box = detected this frame
  </div>
  <div id="ctl">
    <h4>TUNING</h4>
    <div class="row"><label>cluster ε</label><input type="range" id="eps"    min="0.5" max="50" step="0.5"><span class="val" id="eps_v"></span></div>
    <div class="row"><label>min pts @near</label><input type="range" id="minpts" min="1"   max="20" step="1"><span class="val" id="minpts_v"></span></div>
    <div class="row"><label>min speed</label><input type="range" id="speed" min="0"   max="5"  step="0.1"><span class="val" id="speed_v"></span></div>
    <div class="row"><label>min SNR</label><input type="range" id="snrmin" min="0"   max="60" step="1"><span class="val" id="snrmin_v"></span></div>
    <div class="row"><label>FOV ±°</label><input type="range" id="fov"    min="5"   max="90" step="1"><span class="val" id="fov_v"></span></div>
    <div class="row"><label>doppler gate</label><input type="range" id="doppler" min="0.5" max="20" step="0.5"><span class="val" id="doppler_v"></span></div>
  </div>
  <canvas id="ppi"></canvas>
  <script src="radar_view.js"></script>
</body>
</html>
