% A/G long-range chirp — N=384 (proven best). AIRPOC ships this as the
% default radar profile: DCA-free (LVDS off), pure TLV point cloud, max
% range for vehicles / drones / humans. Human baseline: walking person
% visible to ~100 m (dynamic-only).
%
% Physics:
%   R_max = c·Fs / (4·S) = 3e8 · 30e6 / (4 · 4.5e12) = 500 m
%   BW    = S · (N/Fs) = 4.5 · (384/30) = 57.6 MHz
%   Δr    = c / (2·BW) = 3e8 / (2·57.6e6) = 2.60 m
%   Processing gain: 10·log10(384) = 25.8 dB
%
% CFAR: 192 range bins. Proven floor = 17 dB.
% Frame: chirp = idle(12) + ramp(27.5) = 39.5 µs; 6×128 = 768 chirps →
%   ~30.3 ms active → 20 Hz. See docs/FIRMWARE.md for the >20 Hz path
%   (tighten frameCfg period toward the active dwell; N/loops unchanged).
sensorStop
flushCfg
dfeDataOutputMode 1
channelCfg 15 15 0 0 0
adcCfg 2 0
adcbufCfg -1 1 0 0 1
lowPower 0 0
profileCfg 0 77 12 7 27.5 0 0 4.5 0 384 30000 0 0 164
chirpCfg 0 5 0 0 0 0 0 15
frameCfg 0 5 128 0 192 50 1 0
% detectedObjects=2 requests per-point SideInfo (SNR) so the GUI's SNR slider
% has values to filter on. NOTE: the current mmw_demoDDM build does not emit
% TLV 7 even with this set — per-point SNR stays null until a Phase-2 firmware
% enables SideInfo. Harmless forward-compat now.
guiMonitor -1 2 1 0 0 0 1
% MIN SNR in the cfg = CFAR range threshold 17.0 dB — the floor before the
% chip floods/collapses. Kept minimal so the chip publishes the MOST points;
% the GUI filters SNR tighter live (once per-point SNR is available).
cfarCfg -1 1 3 16 0 0 1 17.0 1 7 0 1 0
cfarCfg -1 0 3 16 0 0 0 15.0 0 7 0 0
compressionCfg -1 1 1 0.5 8
intfMitigCfg -1 15 18
localMaxCfg -1 3 40
ddmPhaseShiftAntOrder 0 2 3 1
antGeometryCfg 1 0 1 1 1 2 1 3 0 2 0 3 0 4 0 5 1 4 1 5 1 6 1 7 1 8 1 9 1 10 1 11 0.5 0.8
antennaCalibParams 0.00000 -0.29694 -0.38086 -0.26746 -0.46326 -0.31146 -0.43408 0.21661 -0.57410 -0.38519 -0.33844 -0.37524 -0.43256 -0.40015 -0.39343 0.30347 -0.77173 -0.44043 -0.31732 -0.43945 -0.41565 -0.45862 -0.37561 0.45654 -0.88971 -0.39307 -0.32764 -0.39508 -0.42010 -0.39899 -0.39032 0.31293
measureRangeBiasAndRxChanPhase 0 1.5 0.2
analogMonitor 0 0
calibData 0 0 0x1f0000
% MAX FOV in the cfg — publish every detection the chip finds across the full
% angular span; the GUI trims azimuth live with a slider (no cfg re-push).
% Useful AoA is ~±60° (antenna pattern collapses beyond); GUI default sits
% there. Wide FOV does not cost range — aoaFovCfg is only an angle gate.
aoaFovCfg -1 -90 90 -90 90
lvdsStreamCfg -1 0 0 0
sensorStart
