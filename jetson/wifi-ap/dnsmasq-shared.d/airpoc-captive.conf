# Resolve OS connectivity-check domains to the AP host (10.42.0.1) so the launcher's
# :80 helper can answer them. Without this the phone can't resolve them at all (no
# internet), Android marks AIRPOC "no internet", and shoves traffic to cellular — making
# http://10.42.0.1:8088 unreachable unless mobile data is off. Loaded by NetworkManager's
# shared-mode dnsmasq (--conf-dir=/etc/NetworkManager/dnsmasq-shared.d).
# Single URL for both networks: on the AP, resolve the same name the home router uses
# (orin-nano.lan) to the AP host, so http://orin-nano.lan:8088 works on home WiFi AND
# on AIRPOC. Also the bare hostname and .local for good measure.
address=/orin-nano.lan/10.42.0.1
address=/orin-nano/10.42.0.1
address=/orin-nano.local/10.42.0.1

address=/connectivitycheck.gstatic.com/10.42.0.1
address=/connectivitycheck.android.com/10.42.0.1
address=/clients3.google.com/10.42.0.1
address=/clients1.google.com/10.42.0.1
address=/www.google.com/10.42.0.1
address=/play.googleapis.com/10.42.0.1
address=/captive.apple.com/10.42.0.1
address=/www.msftconnecttest.com/10.42.0.1
address=/connectivitycheck.platform.hicloud.com/10.42.0.1
